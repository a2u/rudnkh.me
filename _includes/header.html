<div class="site-header">
<div class="site-lang">
{% if site.active_lang == "en" %}
<a href="/ru{{site.baseurl}}{{page.url}}">RU</a>
{% else %}
<a href=" {{site.baseurl}}{{page.url}}">EN</a>
{% endif %}
</div>


    <nav class="site-nav">
      <a href="#" class="menu-icon">
        <i class="fa fa-navicon fa-2x"></i>
      </a>

      <div class="trigger">
          <a class="page-link" href="{{ site.baseurl }}/">{{ site.data["text"]["home"] }}</a>
          {% for page in site.pages %}
            {% if page.title %}
              {% unless page.exclude %}
                <a class="page-link" href="{{ page.url | prepend: site.baseurl }}">{{ page.title }}</a>
              {% endunless %}
            {% endif %}
          {% endfor %}
          <a class="page-link" href="https://github.com/a2u" target="_blank">Github</a>
      </div>
    </nav>


</div>
